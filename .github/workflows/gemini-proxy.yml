name: Gemini Proxy
on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Start Proxy Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pip install requests -q

          python3 << 'PYEOF'
          import requests, json, time, os, base64, traceback

          API_KEY = os.environ['GEMINI_API_KEY']
          GH_TOKEN = os.environ['GH_TOKEN']
          REPO = os.environ['REPO']
          HEADERS = {
              'Authorization': f'token {GH_TOKEN}',
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github.v3+json'
          }
          BASE = 'https://api.github.com'

          def get_file(path):
              r = requests.get(f'{BASE}/repos/{REPO}/contents/{path}', headers=HEADERS)
              if r.status_code == 200:
                  data = r.json()
                  content = base64.b64decode(data['content']).decode('utf-8')
                  return json.loads(content), data['sha']
              return None, None

          def put_file(path, content, sha=None):
              encoded = base64.b64encode(json.dumps(content, ensure_ascii=False).encode('utf-8')).decode()
              body = {'message': f'proxy: update {path}', 'content': encoded}
              if sha:
                  body['sha'] = sha
              r = requests.put(f'{BASE}/repos/{REPO}/contents/{path}', headers=HEADERS, json=body)
              return r.status_code

          def call_gemini(model, contents):
              r = requests.post(
                  f'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={API_KEY}',
                  json={'contents': contents},
                  timeout=60
              )
              return r.json()

          print('鉁� Gemini Proxy started 鈥� polling every 3 seconds...')
          last_id = None

          while True:
              try:
                  data, sha = get_file('queue/prompt.json')
                  if data and data.get('id') and data.get('id') != last_id:
                      req_id = data['id']
                      last_id = req_id
                      print(f'馃摠 Request [{req_id}] model={data.get("model")}')

                      result = call_gemini(data['model'], data['contents'])

                      resp_path = f'queue/response_{req_id}.json'
                      _, existing_sha = get_file(resp_path)
                      status = put_file(resp_path, result, existing_sha)
                      print(f'鉁� Response written [{req_id}] status={status}')

              except Exception as e:
                  print(f'鈿狅笍 Error: {e}')
                  traceback.print_exc()

              time.sleep(3)
          PYEOF
