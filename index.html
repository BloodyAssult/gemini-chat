<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8e8;
    --text2: #888;
    --accent: #4f8ef7;
    --accent2: #2d6fe0;
    --user-bg: #1e3a5f;
    --model-bg: #1a1a1a;
    --radius: 12px;
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  header select {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    direction: ltr;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn-icon {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-icon:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  #setup-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .setup-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 400px;
    width: 100%;
  }
  .setup-card h2 { font-size: 20px; margin-bottom: 8px; color: var(--accent); }
  .setup-card p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
  .setup-card input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 12px;
    font-size: 14px; outline: none; direction: ltr; margin-bottom: 12px;
  }
  .setup-card input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; background: var(--accent); color: white;
    border: none; border-radius: 8px; padding: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-primary:hover { background: var(--accent2); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .msg.user { align-self: flex-start; flex-direction: row-reverse; }
  .msg.model { align-self: flex-end; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--accent); color: white; }
  .msg.model .avatar { background: #2d2d2d; color: var(--text2); }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
    color: #d4e8ff;
  }
  .msg.model .bubble {
    background: var(--model-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    direction: auto;
  }
  .bubble code {
    background: rgba(255,255,255,0.07);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  .bubble pre {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
    direction: ltr;
  }
  .bubble pre code { background: none; padding: 0; }

  .typing-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: blink 1.2s infinite;
    margin: 0 2px;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #prompt {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 150px;
    min-height: 42px;
    line-height: 1.5;
    font-family: inherit;
    direction: auto;
  }
  #prompt:focus { border-color: rgba(79,142,247,0.5); }
  #send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    width: 42px; height: 42px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { background: #333; cursor: not-allowed; }
  .status-bar {
    font-size: 11px;
    color: var(--text2);
    text-align: center;
    margin-top: 6px;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 40px; }
  .empty-state p { font-size: 14px; text-align: center; }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    padding: 0 20px;
  }
  .suggestion-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="setup-overlay">
  <div class="setup-card">
    <h2>🔑 Gemini API Key</h2>
    <p>کلید API ات رو وارد کن. فقط توی مرورگرت ذخیره میشه و جایی ارسال نمیشه.</p>
    <input type="password" id="api-key-input" placeholder="AIzaSy..." />
    <button class="btn-primary" onclick="saveKey()">شروع کن</button>
  </div>
</div>

<header>
  <span class="logo">✦ Gemini</span>
  <select id="model-select">
    <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
    <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
    <option value="gemini-3.1-pro-preview-customtools">Gemini 3.1 Pro (Tools)</option>
    <option value="gemini-2.5-flash-preview-05-20">Gemini 2.5 Flash</option>
  </select>
  <div class="header-actions">
    <button class="btn-icon" onclick="clearChat()">پاک کردن</button>
    <button class="btn-icon" onclick="changeKey()">کلید</button>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="icon">✦</div>
    <p>چی می‌خوای بپرسی؟</p>
    <div class="suggestions">
      <span class="suggestion-chip" onclick="useSuggestion(this)">یه کد پایتون بنویس</span>
      <span class="suggestion-chip" onclick="useSuggestion(this)">توضیح بده هوش مصنوعی چیه</span>
      <span class="suggestion-chip" onclick="useSuggestion(this)">یه داستان کوتاه بنویس</span>
      <span class="suggestion-chip" onclick="useSuggestion(this)">بهم انگلیسی یاد بده</span>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="prompt" placeholder="پیامت رو بنویس..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="status-bar" id="status-bar">آماده</div>
</footer>

<script>
const HISTORY_KEY = 'gemini_history';
const KEY_KEY = 'gemini_api_key';

let history = [];
let isLoading = false;

function init() {
  const key = localStorage.getItem(KEY_KEY);
  if (key) {
    document.getElementById('setup-overlay').style.display = 'none';
  }
  const saved = localStorage.getItem(HISTORY_KEY);
  if (saved) {
    history = JSON.parse(saved);
    history.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'model', m.parts[0].text, false));
    if (history.length > 0) {
      document.getElementById('empty-state').style.display = 'none';
    }
  }
}

function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  localStorage.setItem(KEY_KEY, k);
  document.getElementById('setup-overlay').style.display = 'none';
}

function changeKey() {
  document.getElementById('api-key-input').value = localStorage.getItem(KEY_KEY) || '';
  document.getElementById('setup-overlay').style.display = 'flex';
}

function clearChat() {
  if (!confirm('تاریخچه پاک بشه؟')) return;
  history = [];
  localStorage.removeItem(HISTORY_KEY);
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="icon">✦</div>
      <p>چی می‌خوای بپرسی؟</p>
      <div class="suggestions">
        <span class="suggestion-chip" onclick="useSuggestion(this)">یه کد پایتون بنویس</span>
        <span class="suggestion-chip" onclick="useSuggestion(this)">توضیح بده هوش مصنوعی چیه</span>
        <span class="suggestion-chip" onclick="useSuggestion(this)">یه داستان کوتاه بنویس</span>
        <span class="suggestion-chip" onclick="useSuggestion(this)">بهم انگلیسی یاد بده</span>
      </div>
    </div>`;
}

function useSuggestion(el) {
  document.getElementById('prompt').value = el.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function appendMessage(role, text, save = true) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'ش' : 'G';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg model';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="avatar">G</div>
    <div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const promptEl = document.getElementById('prompt');
  const text = promptEl.value.trim();
  if (!text) return;

  const apiKey = localStorage.getItem(KEY_KEY);
  if (!apiKey) { changeKey(); return; }

  promptEl.value = '';
  promptEl.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('status-bar').textContent = 'در حال ارسال...';

  appendMessage('user', text);
  history.push({ role: 'user', parts: [{ text }] });

  showTyping();

  const model = document.getElementById('model-select').value;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: history })
      }
    );
    const data = await res.json();
    removeTyping();

    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(پاسخی دریافت نشد)';
    appendMessage('model', reply);
    history.push({ role: 'model', parts: [{ text: reply }] });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    document.getElementById('status-bar').textContent = `مدل: ${model} — ${history.length/2} پیام`;
  } catch (err) {
    removeTyping();
    appendMessage('model', `خطا: ${err.message}`);
    document.getElementById('status-bar').textContent = 'خطا در ارسال';
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  promptEl.focus();
}

init();
</script>
</body>
</html>
